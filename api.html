<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake Store Dashboard</title>
</head>
<body>
    <script src="./api.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f4f4f4;
            padding:20px;
        }

        h1{
            text-align:center;
            margin-bottom:20px;
        }

        .controls{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
            justify-content:center;
            margin-bottom:20px;
        }

        input,select{
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        .stats{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
            gap:15px;
            margin-bottom:20px;
        }

        .card-stat{
            background:white;
            padding:15px;
            border-radius:10px;
            text-align:center;
            box-shadow:0 2px 5px rgba(0,0,0,0.1);
        }

        #status{
            text-align:center;
            margin:15px;
            font-weight:bold;
        }

        #cartInfo{
            text-align:center;
            margin-bottom:20px;
            font-size:18px;
            font-weight:bold;
        }

        .products{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
        }

        .product-card{
            background:white;
            padding:15px;
            border-radius:10px;
            box-shadow:0 2px 5px rgba(0,0,0,0.2);
        }

        .product-card img{
            width:100%;
            height:200px;
            object-fit:contain;
        }

        .product-card h3{
            font-size:16px;
            margin:10px 0;
        }

        .product-card p{
            margin:5px 0;
        }

        button{
            padding:8px 12px;
            border:none;
            border-radius:5px;
            cursor:pointer;
            margin-top:10px;
        }

        .add-btn{
            background:green;
            color:white;
        }

        .remove-btn{
            background:red;
            color:white;
        }
    </style>
</head>
<body>

    <h1>Fake Store Dashboard</h1>

    <div class="controls">
        <input type="text" id="search" placeholder="Search Product">

        <select id="category">
            <option value="all">All</option>
            <option value="men's clothing">Men's Clothing</option>
            <option value="women's clothing">Women's Clothing</option>
            <option value="electronics">Electronics</option>
            <option value="jewelery">Jewelry</option>
        </select>
    </div>

    <div id="cartInfo">
        Cart Count: <span id="cartCount">0</span>
    </div>

    <div class="stats">
        <div class="card-stat">
            <h3>Total Products</h3>
            <p id="totalProducts"></p>
        </div>

        <div class="card-stat">
            <h3>Average Price</h3>
            <p id="averagePrice"></p>
        </div>

        <div class="card-stat">
            <h3>Highest Price</h3>
            <p id="highestPrice"></p>
        </div>

        <div class="card-stat">
            <h3>Lowest Price</h3>
            <p id="lowestPrice"></p>
        </div>
    </div>

    <div id="status">Loading Products...</div>

    <div class="products" id="products"></div>

</body>
</html>
